services:
  db:
    image: postgres:15
    container_name: openai_billing_db
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo_password
      POSTGRES_DB: openai_billing
    volumes:
      - openai_billing_pgdata:/var/lib/postgresql/data
      - ./init-user-db.sql:/docker-entrypoint-initdb.d/init-user-db.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d openai_billing"]
      interval: 5s
      timeout: 3s
      retries: 10

  odoo:
    image: odoo:19
    container_name: openai_billing_odoo
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    volumes:
      - ./:/mnt/extra-addons/openai_billing
      - openai_billing_odoo_data:/var/lib/odoo
    command: >
      -- --db_host=db
         --db_user=odoo
         --db_password=odoo_password
         --database=openai_billing
         --addons-path=/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
    restart: unless-stopped

volumes:
  openai_billing_pgdata:
  openai_billing_odoo_data:
