services:
  db:
    image: postgres:15
    container_name: openai_billing_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: openai_billing
    volumes:
      - openai_billing_pgdata:/var/lib/postgresql/data
      - ./init-user-db.sql:/docker-entrypoint-initdb.d/init-user-db.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d openai_billing"]
      interval: 5s
      timeout: 3s
      retries: 10

  odoo:
    image: odoo:19
    container_name: openai_billing_odoo
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    environment:
      # These env vars are read by the Odoo entrypoint (/entrypoint.sh).
      # They MUST be set here — NOT as command-line args — because the
      # entrypoint appends its own --db_* flags AFTER $@, and Python's
      # optparse uses the LAST occurrence.  If we relied on command args,
      # the entrypoint's defaults (user=odoo, password=odoo) would silently
      # override ours and cause "password authentication failed".
      HOST: db
      USER: admin
      PASSWORD: "1234"
    volumes:
      - ./:/mnt/extra-addons/openai_billing
      - openai_billing_odoo_data:/var/lib/odoo
    command: >-
      -- --database=openai_billing
         --addons-path=/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
    restart: unless-stopped

volumes:
  openai_billing_pgdata:
  openai_billing_odoo_data:
