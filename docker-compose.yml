services:
  db:
    image: postgres:15
    container_name: openai_billing_db
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - openai_billing_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 5s
      timeout: 3s
      retries: 10

  odoo:
    image: odoo:19
    container_name: openai_billing_odoo
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    environment:
      # The Odoo 19 entrypoint (/entrypoint.sh) defaults to
      # USER=odoo, PASSWORD=odoo, HOST=db.  We use those same
      # defaults for PostgreSQL so everything "just works"
      # without any custom credentials.
      HOST: db
    volumes:
      - ./:/mnt/extra-addons/openai_billing
      - openai_billing_odoo_data:/var/lib/odoo
    command: >-
      -- --addons-path=/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
    restart: unless-stopped

volumes:
  openai_billing_pgdata:
  openai_billing_odoo_data:
